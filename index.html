<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أمان بيتك | صيانة هواتف ببابك</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --p: #00c853; --s: #1a237e; --w: #ffffff; --wa: #25D366; --gray: #607d8b; }
        body {
            font-family: 'Tajawal', sans-serif; margin: 0;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            min-height: 100vh; color: #333; overflow-x: hidden;
        }

        /* شاشة الترحيب (Logo Splash) - تم تحديثها */
        #splash {
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(255,255,255,0.98); z-index: 9999; display: flex; flex-direction: column;
            align-items: center; justify-content: center; transition: 0.8s;
        }
        #splash img { width: 180px; border-radius: 20px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.05);} 100% {transform: scale(1);} }
        
        nav {
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(15px);
            padding: 15px; display: flex; justify-content: space-around;
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        nav button {
            background: none; border: 2px solid rgba(255,255,255,0.3); color: white;
            padding: 10px 25px; border-radius: 50px; cursor: pointer; transition: 0.4s; font-weight: bold;
        }
        nav button.active { background: var(--p); border: none; box-shadow: 0 4px 15px rgba(0,200,83,0.4); }

        .page { display: none; padding: 20px; max-width: 500px; margin: auto; animation: slideUp 0.5s ease; }
        .page.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; } }

        .card { background: rgba(255, 255, 255, 0.96); padding: 25px; border-radius: 35px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); margin-bottom: 20px; }
        .input-group { margin-bottom: 18px; position: relative; margin-right: 0px;}
        .input-group i { position: absolute; right: 15px; top: 18px; color: var(--p); font-size: 18px; }
        input, textarea, select {
            width: 100%; padding: 16px 50px 16px 15px; border: 2px solid #eee;
            border-radius: 18px; box-sizing: border-box; font-family: 'Tajawal'; font-size: 16px;
        }

        .btn {
            background: var(--p); color: white; border: none; width: 100%; padding: 15px;
            border-radius: 20px; font-size: 1rem; font-weight: 800; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s;
            text-decoration: none;
        }
        .btn-wa { background: var(--wa) !important; font-size: 14px; text-decoration: none; }
        
        .job-card { background: white; border-right: 8px solid var(--p); padding: 20px; margin-bottom: 20px; border-radius: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .job-img { width: 100%; border-radius: 15px; margin-bottom: 15px; object-fit: cover; max-height: 200px; cursor: pointer; transition: 0.3s;}
        .job-img:hover { transform: scale(1.02); }
        .time-tag { background: #f0f0f0; padding: 4px 10px; border-radius: 10px; font-size: 11px; color: #666; }

        /* طبقة تكبير الصور (Modal) */
        .img-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 99999;
            align-items: center; justify-content: center; opacity: 0; transition: 0.3s;
        }
        .img-modal.open { display: flex; opacity: 1; }
        .modal-content { max-width: 90%; max-height: 90%; border-radius: 15px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .modal-close { position: absolute; top: 20px; left: 20px; color: white; font-size: 30px; cursor: pointer; }
    </style>
</head>
<body>

<div id="splash">
    <img src="https://i.ibb.co/VpCkP9v7/1775975830101.png" alt="Aman Baytak Logo">
    <h2 style="color: #00c853; margin-top: 20px; font-weight: 800;">أمان بيتك</h2>
    <p style="color: #666;">نحمي هاتفك المكسور، ونعيده جديداً بباب بيتك.</p>
</div>


<div class="img-modal" id="imageModal" onclick="closeImageModal()">
    <span class="modal-close">&times;</span>
    <img class="modal-content" id="modalContent">
</div>

<nav>
    <button id="btn-customer" class="active" onclick="showPage('customer')">طلب صيانة</button>
    <button id="btn-technician" onclick="showPage('technician')">لوحة الفنيين</button>
</nav>

<div id="customer" class="page active">
    <div class="card">
        <h2 style="text-align:center; color:var(--s); margin-bottom:25px;">📱 اطلب صيانة الآن</h2>
        <div class="input-group"><i class="fas fa-user"></i><input type="text" id="zName" placeholder="اسمك الكامل"></div>
        <div class="input-group"><i class="fas fa-phone"></i><input type="tel" id="zPhone" placeholder="رقم الهاتف (مثال: 0770...)"></div>
        <div class="input-group"><i class="fas fa-mobile-alt"></i><input type="text" id="zDevice" placeholder="نوع وموديل الجهاز"></div>
        <div class="input-group"><i class="fas fa-map-marker-alt"></i><input type="text" id="zAddress" placeholder="عنوان السكن (المحافظة/الحي)"></div>
        <div class="input-group"><i class="fas fa-tools"></i><textarea id="zDesc" rows="3" placeholder="اشرح لنا المشكلة في جهازك"></textarea></div>
        <div class="input-group"><i class="fas fa-money-bill-wave"></i><input type="text" id="zPrice" placeholder="السعر المتفق عليه إن وجد"></div>
        
        <div class="upload-area" onclick="document.getElementById('zFile').click()" style="border:3px dashed var(--p); padding:30px; text-align:center; border-radius:25px; margin-bottom:20px; cursor:pointer; background: #f0fff4;">
            <i class="fas fa-camera" style="font-size: 30px; color: var(--p);"></i><br><br>
            <strong>اضغط لتصوير الجهاز المكسور</strong>
            <input type="file" id="zFile" accept="image/*" capture="camera" style="display:none;" onchange="previewFile()">
            <img id="file-preview" style="width:100%; border-radius:15px; margin-top:15px; display:none;">
        </div>

        <button class="btn" id="submitBtn" onclick="orderNow()"><i class="fab fa-whatsapp"></i> إرسال الطلب للفنيين</button>
    </div>
</div>

<div id="technician" class="page">
    <div id="lock-screen" class="card" style="text-align:center;">
        <h3>دخول الفنيين</h3>
        <input type="password" id="techCode" placeholder="كود الدخول">
        <button class="btn" style="background:var(--s); margin-top:20px;" onclick="unlock()">فتح اللوحة</button>
    </div>

    <div id="tech-profile-setup" class="card" style="display:none;">
        <h4>تسجيل بياناتك كفني</h4>
        <div class="input-group"><i class="fas fa-user-gear"></i><input type="text" id="tName" placeholder="الاسم الكامل"></div>
        <div class="input-group"><i class="fas fa-phone"></i><input type="tel" id="tPhone" placeholder="رقم الموبايل"></div>
        <button class="btn" onclick="saveTechProfile()">دخول</button>
    </div>

    <div id="jobs-dashboard" style="display:none;">
        <div class="tech-tabs">
            <button class="btn" id="tab-active" onclick="toggleArchive(false)">النشطة</button>
            <button class="btn" id="tab-archive" style="background:var(--gray)" onclick="toggleArchive(true)">الأرشيف</button>
        </div>
        <div id="jobs-list"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBtQaVNSMC2Pkq0HmS2rql0So-4zK-czC0",
        authDomain: "aman-baytak-app.firebaseapp.com",
        projectId: "aman-baytak-app",
        databaseURL: "https://aman-baytak-app-default-rtdb.asia-southeast1.firebasedatabase.app",
        storageBucket: "aman-baytak-app.firebasestorage.app",
        messagingSenderId: "986750911757",
        appId: "1:986750911757:web:2b1693053e5641ca6b5c44"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const jobsPath = `aman_jobs`;
    let showArchive = false;

    // إخفاء الـ Splash
    window.addEventListener('load', () => {
        setTimeout(() => {
            const sp = document.getElementById('splash');
            sp.style.opacity = '0';
            setTimeout(() => sp.style.display = 'none', 800);
        }, 3000); // زيادة الوقت قليلاً لثبات الرسالة
    });

    // ميزة تكبير الصور الجديدة
    window.openImageModal = (src) => {
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalContent');
        if (document.getElementById('technician').classList.contains('active')) {
            modal.classList.add('open');
            modalImg.src = src;
        }
    }

    window.closeImageModal = () => {
        const modal = document.getElementById('imageModal');
        modal.classList.remove('open');
    }

    function getWaLink(phone) {
        let p = phone.trim();
        if (p.startsWith('07')) p = '964' + p.substring(1);
        else if (p.startsWith('7')) p = '964' + p;
        return `https://wa.me/${p}`;
    }

    window.showPage = (p) => {
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
        document.getElementById(p).classList.add('active');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-'+p).classList.add('active');
        closeImageModal();
    };

    window.unlock = () => {
        if(document.getElementById('techCode').value === "aman202300") {
            document.getElementById('lock-screen').style.display = 'none';
            const saved = localStorage.getItem('techInfo');
            if(saved) { document.getElementById('jobs-dashboard').style.display='block'; loadJobs(); }
            else document.getElementById('tech-profile-setup').style.display='block';
        } else alert("خطأ!");
    };

    window.saveTechProfile = () => {
        const n = document.getElementById('tName').value;
        const ph = document.getElementById('tPhone').value;
        if(n && ph) {
            localStorage.setItem('techInfo', JSON.stringify({name:n, phone:ph}));
            document.getElementById('tech-profile-setup').style.display='none';
            document.getElementById('jobs-dashboard').style.display='block';
            loadJobs();
        }
    };

    window.toggleArchive = (val) => { showArchive = val; loadJobs(); };

    function loadJobs() {
        onValue(ref(db, jobsPath), (snap) => {
            const list = document.getElementById('jobs-list');
            list.innerHTML = "";
            snap.forEach((child) => {
                const j = child.val();
                const id = child.key;
                const isArchived = (j.status === "مكتمل" || j.status === "مؤرشف");
                if (showArchive !== isArchived) return;

                list.innerHTML = `
                    <div class="job-card" style="border-right-color: ${isArchived?'#666':(j.status==='متاح'?'#00c853':'#ff9800')}">
                        ${j.img ? `<img src="${j.img}" class="job-img" onclick="openImageModal('${j.img}')">` : ''}
                        <strong>${j.name}</strong><br><small>${j.address}</small>
                        <p>📱 ${j.device}<br>🔧 ${j.desc}</p>
                        <div style="display:flex; gap:10px;">
                            ${j.status==='متاح'?`<button class="btn" onclick="takeJob('${id}','${j.phone}')">قبول</button>`:''}
                            <a href="${getWaLink(j.phone)}" target="_blank" class="btn btn-wa"><i class="fab fa-whatsapp"></i> مراسلة</a>
                        </div>
                        ${j.status==='قيد التنفيذ'?`<button class="btn" style="margin-top:10px; background:#1a237e" onclick="doneJob('${id}')">تم الإنجاز</button>`:''}
                        ${!isArchived ? `<button class="btn" style="margin-top:10px; background:#ff5252" onclick="doneJob('${id}','مؤرشف')">أرشفة</button>`:''}
                    </div>` + list.innerHTML;
            });
        });
    }

    window.takeJob = async (id, ph) => {
        const t = JSON.parse(localStorage.getItem('techInfo'));
        await update(ref(db, `${jobsPath}/${id}`), { status: "قيد التنفيذ", techName: t.name });
        window.open(getWaLink(ph)+`?text=مرحباً، أنا الفني ${t.name} من أمان بيتك.. استلمت طلبك.`, '_blank');
    }

    window.doneJob = async (id, stat="مكتمل") => {
        if(confirm("تأكيد نقل الطلب للأرشيف؟")) await update(ref(db, `${jobsPath}/${id}`), { status: stat });
    }

    window.previewFile = () => {
        const file = document.getElementById('zFile').files[0];
        const preview = document.getElementById('file-preview');
        const reader = new FileReader();
        reader.onloadend = () => { preview.src = reader.result; preview.style.display = "block"; };
        if (file) reader.readAsDataURL(file);
    };

    window.orderNow = async () => {
        const btn = document.getElementById('submitBtn');
        const data = { name: document.getElementById('zName').value, phone: document.getElementById('zPhone').value, device: document.getElementById('zDevice').value, address: document.getElementById('zAddress').value, desc: document.getElementById('zDesc').value, price: document.getElementById('zPrice').value };
        const f = document.getElementById('zFile').files[0];
        if(!data.name || !data.phone || !f) return alert("أكمل البيانات");
        btn.disabled = true; btn.innerText = "جاري الإرسال...";
        try {
            const fd = new FormData(); fd.append("image", f);
            const res = await fetch("https://api.imgbb.com/1/upload?key=6ccfe3473a01a90dffef5e509ac500dc", { method:"POST", body:fd });
            const img = await res.json();
            await set(push(ref(db, jobsPath)), { ...data, img: img.data.url, status: "متاح", createdAt: new Date().toISOString() });
            alert("تم إرسال طلبك!"); location.reload();
        } catch(e) { alert("خطأ بالاتصال"); btn.disabled = false; }
    };
</script>
</body>
                                     </html>
