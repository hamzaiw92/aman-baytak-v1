<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="google-adsense-account" content="ca-pub-3978081560356599">
    
    <title>أمان بيتك | إدارة الصيانة</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3978081560356599"
     crossorigin="anonymous"></script>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --p: #00c853; --s: #1a237e; --danger: #ff5252; --gray: #f4f4f4; --fb: #1877F2; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Tajawal', sans-serif; margin: 0; background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d); min-height: 100vh; color: #333; }
        
        #splash { position: fixed; inset: 0; background: white; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #auth-screen { position: fixed; inset: 0; background: #f8f9fa; z-index: 9999; display: none; padding: 20px; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 380px; text-align: center; }

        #logout-trigger { position: fixed; left: 15px; top: 15px; z-index: 2000; background: var(--danger); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: none; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

        nav { background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); padding: 15px; display: none; justify-content: center; gap: 5px; position: sticky; top:0; z-index: 1000; overflow-x: auto; }
        nav button { flex: none; padding: 10px 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white; font-weight: 700; cursor: pointer; font-size: 11px; white-space: nowrap; }
        nav button.active { background: var(--p); border: none; }

        .page { display: none; padding: 20px; max-width: 550px; margin: 0 auto; }
        .page.active { display: block; }
        .card { background: white; padding: 25px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); margin-top: 15px; }
        
        .input-group { margin-bottom: 12px; position: relative; }
        .input-group i { position: absolute; right: 15px; top: 16px; color: var(--p); }
        input, textarea { width: 100%; padding: 14px 45px 14px 15px; border: 2px solid #eee; border-radius: 18px; font-family: 'Tajawal'; outline: none; font-size: 15px; transition: 0.3s; }
        
        .btn-main { background: var(--p); color: white; border: none; width: 100%; padding: 16px; border-radius: 20px; font-weight: 900; cursor: pointer; font-size: 17px; box-shadow: 0 5px 15px rgba(0,200,83,0.3); margin-top: 10px; }
        
        .tech-profile { background: #fff; border-radius: 25px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border: 1px solid #eee; text-align: center; position: relative; overflow: hidden; }
        .tech-profile::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 60px; background: linear-gradient(to right, #1a237e, #00c853); opacity: 0.1; }
        .tech-img { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 4px solid white; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 10px; }
        .tech-name { font-size: 18px; color: var(--s); font-weight: 900; margin: 5px 0; }
        .tech-job { font-size: 13px; color: var(--p); font-weight: bold; margin-bottom: 15px; display: block; }
        .tech-actions { display: flex; gap: 10px; justify-content: center; }
        .action-btn { flex: 1; padding: 10px; border-radius: 12px; border: none; font-family: 'Tajawal'; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 12px; }
        .btn-call { background: #e8f5e9; color: #2e7d32; }
        .btn-fb { background: #e3f2fd; color: var(--fb); }

        .order-item { background: #fff; padding: 20px; border-radius: 25px; border-right: 6px solid var(--p); margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .section-label { color: white; background: rgba(0,0,0,0.4); padding: 8px 20px; border-radius: 50px; display: inline-block; margin: 20px 0 10px; font-size: 14px; font-weight: bold; }
        .footer-txt { text-align: center; color: white; padding: 30px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<button id="logout-trigger" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i></button>

<div id="splash">
    <img src="https://i.ibb.co/v4Rv89wf/1776003967024.png" width="160">
    <h1 style="color: var(--p); margin-top: 15px;">أمان بيتك</h1>
</div>

<div id="auth-screen">
    <div class="login-card">
        <img src="https://i.ibb.co/v4Rv89wf/1776003967024.png" width="80" style="margin-bottom: 15px;">
        <h2 style="color: var(--s);">تسجيل الدخول</h2>
        <button class="btn-main" onclick="loginWithGoogle()" style="background:#fff; color:#333; border:1px solid #ddd; display:flex; align-items:center; justify-content:center; gap:10px;">
            <img src="https://www.google.com/favicon.ico" width="20"> الدخول بواسطة جوجل
        </button>
    </div>
</div>

<nav id="main-nav">
    <button id="btn-customer" class="active" onclick="showTab('customer')">طلب صيانة</button>
    <button id="btn-workers" onclick="showTab('workers')">الفنيين 👷</button>
    <button id="btn-location" onclick="showTab('location')">موقعنا 📍</button>
    <button id="btn-technician" onclick="showTab('technician')">لوحة التحكم</button>
</nav>

<div id="customer" class="page active">
    <div style="text-align:center; margin-bottom:10px;">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-3978081560356599"
             data-ad-slot="auto"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
    </div>

    <div class="card">
        <h3 style="text-align: center; margin-top: 0;">📱 تفاصيل طلب الصيانة 📱</h3>
        <div class="input-group"><i class="fas fa-user"></i><input type="text" id="cust-name" placeholder="الاسم الكامل"></div>
        <div class="input-group"><i class="fas fa-phone"></i><input type="tel" id="cust-phone" placeholder="رقم الموبايل"></div>
        <div class="input-group"><i class="fas fa-map-marker-alt"></i><input type="text" id="cust-address" placeholder="العنوان بالتفصيل"></div>
        <div class="input-group"><i class="fas fa-mobile-alt"></i><input type="text" id="cust-device" placeholder="نوع الجهاز"></div>
        <div class="input-group"><i class="fas fa-tools"></i><input type="text" id="cust-issue" placeholder="وصف العطل"></div>
        <div class="input-group"><i class="fas fa-sticky-note"></i><textarea id="cust-notes" style="width:100%; height:70px; border-radius:18px; padding:15px; border:2px solid #eee;" placeholder="ملاحظات إضافية..."></textarea></div>
        <button class="btn-main" id="submitBtn" onclick="submitOrder()">إرسال الطلب الآن</button>
    </div>
</div>

<div id="workers" class="page">
    <div class="section-label">👷 فريق الصيانة المعتمد</div>
    <div id="workers-list">
        <p style="color:white; text-align:center;">جاري تحميل قائمة الفنيين...</p>
    </div>
</div>

<div id="location" class="page">
    <div class="card">
        <h3 style="text-align: center;"><i class="fas fa-map-marked-alt"></i> موقعنا الجغرافي</h3>
        <p style="text-align: center; font-size: 14px;">بغداد - الكرادة - قرب ساحة التحريات</p>
        <button class="btn-main" onclick="window.open('https://maps.google.com')">فتح في الخرائط</button>
    </div>
</div>

<div id="technician" class="page">
    <div class="card" id="tech-login-box">
        <h3>🔐 تسجيل دخول الإدارة</h3>
        <div class="input-group"><i class="fas fa-user-tie"></i><input type="text" id="tech-user" placeholder="الاسم"></div>
        <div class="input-group"><i class="fas fa-key"></i><input type="password" id="tech-pass" placeholder="كلمة المرور"></div>
        <button class="btn-main" onclick="handleAccess()">دخول</button>
    </div>

    <div id="tech-dashboard" style="display: none;">
        <div id="admin-add-worker" style="display:none;">
            <div class="section-label">➕ إضافة فني جديد للنظام (صلاحية مدير)</div>
            <div class="card" style="margin-bottom:20px;">
                <input type="text" id="w-name" placeholder="اسم الفني الكامل" style="margin-bottom:10px;">
                <input type="text" id="w-job" placeholder="الاختصاص (مثلاً: هاردوير)" style="margin-bottom:10px;">
                <input type="tel" id="w-phone" placeholder="رقم الهاتف" style="margin-bottom:10px;">
                <input type="text" id="w-img" placeholder="رابط الصورة المباشر" style="margin-bottom:10px;">
                <input type="text" id="w-fb" placeholder="رابط صفحة الفيسبوك" style="margin-bottom:10px;">
                <button class="btn-main" onclick="addNewWorker()">حفظ الفني في القائمة</button>
            </div>
        </div>

        <div class="section-label">📌 طلبات الصيانة الجديدة</div>
        <div id="new-orders"></div>
        <div class="section-label">✅ طلبات تمت الموافقة عليها</div>
        <div id="archived-orders"></div>
    </div>
</div>

<div class="footer-txt">حقوق محفوظة 2026 © أمان بيتك</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBtQaVNSMC2Pkq0HmS2rql0So-4zK-czC0",
        authDomain: "aman-baytak-app.firebaseapp.com",
        databaseURL: "https://aman-baytak-app-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "aman-baytak-app",
        storageBucket: "aman-baytak-app.firebasestorage.app",
        appId: "1:986750911757:web:2b1693053e5641ca6b5c44"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let currentUserRole = localStorage.getItem('tech_role') || "";

    window.onload = () => {
        (adsbygoogle = window.adsbygoogle || []).push({});
        setTimeout(() => {
            document.getElementById('splash').style.display = 'none';
            if(localStorage.getItem('user_login')) {
                initApp(localStorage.getItem('user_login'));
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
            }
        }, 2000);
        loadWorkers();
    };

    window.loginWithGoogle = async () => {
        try {
            const result = await signInWithPopup(auth, provider);
            localStorage.setItem('user_login', result.user.displayName);
            initApp(result.user.displayName);
        } catch (e) { alert("خطأ في تسجيل الدخول"); }
    };

    function initApp(name) {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-nav').style.display = 'flex';
        document.getElementById('logout-trigger').style.display = 'flex';
        document.getElementById('cust-name').value = name;
        
        if(currentUserRole) {
            document.getElementById('tech-login-box').style.display = 'none';
            document.getElementById('tech-dashboard').style.display = 'block';
            document.getElementById('admin-add-worker').style.display = (currentUserRole === 'admin') ? 'block' : 'none';
            loadOrders();
        }
    }

    window.handleAccess = () => {
        const user = document.getElementById('tech-user').value;
        const pass = document.getElementById('tech-pass').value;
        if(user === 'المدير' && pass === 'hamza199200') { currentUserRole = "admin"; }
        else if(pass === 'aman202300') { currentUserRole = "tech"; }
        else { return alert("خطأ في البيانات"); }
        localStorage.setItem('tech_role', currentUserRole);
        location.reload();
    };

    window.addNewWorker = async () => {
        if(currentUserRole !== 'admin') return alert("ليس لديك صلاحية");
        const wData = {
            name: document.getElementById('w-name').value,
            job: document.getElementById('w-job').value,
            phone: document.getElementById('w-phone').value,
            img: document.getElementById('w-img').value || "https://cdn-icons-png.flaticon.com/512/3135/3135715.png",
            fb: document.getElementById('w-fb').value || "#"
        };
        if(!wData.name || !wData.phone) return alert("الاسم والرقم مطلوبين");
        await push(ref(db, 'workers'), wData);
        alert("تم إضافة الفني بنجاح");
        location.reload();
    };

    function loadWorkers() {
        onValue(ref(db, 'workers'), (snap) => {
            const list = document.getElementById('workers-list');
            list.innerHTML = "";
            snap.forEach((child) => {
                const w = child.val();
                const id = child.key;
                list.innerHTML += `
                    <div class="tech-profile">
                        <img src="${w.img}" class="tech-img">
                        <div class="tech-name">${w.name}</div>
                        <span class="tech-job">${w.job}</span>
                        <div class="tech-actions">
                            <button class="action-btn btn-call" onclick="window.open('tel:${w.phone}')"><i class="fas fa-phone"></i> اتصال</button>
                            <button class="action-btn btn-fb" onclick="window.open('${w.fb}')"><i class="fab fa-facebook"></i> فيسبوك</button>
                            ${currentUserRole === 'admin' ? `<button class="action-btn" style="background:#ff5252; color:#fff" onclick="deleteWorker('${id}')">حذف الفني</button>` : ''}
                        </div>
                    </div>`;
            });
        });
    }

    window.deleteWorker = (id) => { 
        if(currentUserRole === 'admin') { if(confirm("حذف الفني؟")) remove(ref(db, 'workers/'+id)); }
    };

    window.submitOrder = async () => {
        const data = {
            name: document.getElementById('cust-name').value,
            phone: document.getElementById('cust-phone').value,
            address: document.getElementById('cust-address').value,
            device: document.getElementById('cust-device').value,
            issue: document.getElementById('cust-issue').value,
            notes: document.getElementById('cust-notes').value,
            status: "new",
            date: new Date().toLocaleString('ar-EG')
        };
        if(!data.phone || !data.address) return alert("أكمل البيانات");
        await push(ref(db, 'orders'), data);
        alert("تم الإرسال بنجاح");
        location.reload();
    };

    function loadOrders() {
        onValue(ref(db, 'orders'), (snap) => {
            const newDiv = document.getElementById('new-orders');
            const arcDiv = document.getElementById('archived-orders');
            newDiv.innerHTML = ""; arcDiv.innerHTML = "";
            snap.forEach((child) => {
                const o = child.val();
                const id = child.key;
                const card = `<div class="order-item">
                    <b>${o.name}</b> (${o.phone})<br><small>${o.date}</small><br>
                    📍 ${o.address} | 📱 ${o.device}<br>
                    <button class="btn-main" style="padding:5px; font-size:12px; width:auto; background:#1877F2;" onclick="window.open('https://wa.me/964${o.phone.substring(1)}')">واتساب</button>
                    ${o.status === 'new' ? `<button class="btn-main" style="padding:5px; font-size:12px; width:auto;" onclick="updateStatus('${id}')">تمت الصيانة</button>` : ''}
                    ${currentUserRole === 'admin' ? `<button class="btn-main" style="padding:5px; font-size:12px; width:auto; background:red" onclick="deleteOrder('${id}')">حذف الطلب</button>` : ''}
                </div>`;
                if(o.status === 'new') newDiv.innerHTML += card;
                else arcDiv.innerHTML += card;
            });
        });
    }

    window.updateStatus = (id) => update(ref(db, 'orders/'+id), {status: 'archived'});
    window.deleteOrder = (id) => { if(confirm("حذف الطلب؟")) remove(ref(db, 'orders/'+id)); };
    window.showTab = (t) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(t).classList.add('active');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-'+t).classList.add('active');
    };
    window.handleLogout = () => { localStorage.clear(); location.reload(); };
</script>
</body>
</html>
