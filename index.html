<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أمان بيتك | الصيانتك ببابك</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --p: #00c853; --s: #1a237e; --wa: #25D366; --danger: #ff5252; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Tajawal', sans-serif; margin: 0; background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d); background-attachment: fixed; min-height: 100vh; }
        
        #splash { position: fixed; top:0; left:0; width:100%; height:100%; background: white; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        #splash img { width: 220px; }

        nav { background: rgba(0,0,0,0.5); backdrop-filter: blur(15px); padding: 15px; display: flex; justify-content: center; gap: 15px; position: sticky; top:0; z-index: 1000; }
        nav button { flex: 1; max-width: 150px; padding: 12px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white; font-weight: 900; cursor: pointer; }
        nav button.active { background: var(--p); border: none; }

        .page { display: none; padding: 20px; max-width: 600px; margin: 0 auto; }
        .page.active { display: block; }
        
        .card { background: rgba(255, 255, 255, 0.95); padding: 25px; border-radius: 35px; box-shadow: 0 20px 45px rgba(0,0,0,0.3); margin-bottom: 25px; position: relative; }
        
        .input-group { margin-bottom: 18px; position: relative; }
        .input-group i { position: absolute; right: 18px; top: 18px; color: var(--p); }
        input, textarea { width: 100%; padding: 16px 50px 16px 20px; border: 2px solid #e0e0e0; border-radius: 20px; font-family: 'Tajawal'; font-size: 16px; outline: none; }

        .btn { background: var(--p); color: white; border: none; width: 100%; padding: 18px; border-radius: 22px; font-size: 18px; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .btn-danger { background: var(--danger); font-size: 14px; margin-top: 10px; }

        .job-card { background: white; border-radius: 25px; padding: 20px; margin-bottom: 20px; border-right: 8px solid var(--p); position: relative; }
        .job-img { width: 100%; border-radius: 20px; margin-bottom: 15px; max-height: 250px; object-fit: cover; }
        
        .logout-btn { background: #f5f5f5; color: #333; border: 1px solid #ddd; padding: 8px 15px; border-radius: 12px; font-size: 12px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 5px; margin-bottom: 15px; }
        
        .footer-rights { text-align: center; color: white; padding: 20px; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

<div id="splash">
    <img src="https://i.ibb.co/v4Rv89wf/1776003967024.png" alt="Logo">
    <h1 style="color: var(--p)">أهلاً وسهلاً بك</h1>
    <p>في منصة أمان بيتك للصيانة</p>
</div>

<nav>
    <button id="btn-customer" class="active" onclick="showPage('customer')">طلب صيانة</button>
    <button id="btn-technician" onclick="showPage('technician')">لوحة الفنيين</button>
</nav>

<div id="customer" class="page active">
    <div class="card">
        <h2 style="text-align: center;">📱 اطلب فني الآن</h2>
        <div class="input-group"><i class="fas fa-user"></i><input type="text" id="zName" placeholder="الاسم الكامل"></div>
        <div class="input-group"><i class="fas fa-phone"></i><input type="tel" id="zPhone" placeholder="رقم الهاتف"></div>
        <div class="input-group"><i class="fas fa-mobile-alt"></i><input type="text" id="zDevice" placeholder="موديل الجهاز"></div>
        <div class="input-group"><i class="fas fa-map-marker-alt"></i><input type="text" id="zAddress" placeholder="العنوان بالتفصيل"></div>
        <div class="input-group"><i class="fas fa-tools"></i><textarea id="zDesc" rows="2" placeholder="شرح العطل"></textarea></div>
        
        <div class="btn" style="background:#f0f0f0; color:#333; margin-bottom:15px;" onclick="document.getElementById('zFile').click()">
            <i class="fas fa-camera"></i> تصوير الجهاز (مطلوب)
        </div>
        <input type="file" id="zFile" accept="image/*" capture="camera" style="display:none;" onchange="previewFile(this)">
        <img id="file-preview" style="width: 100%; border-radius: 20px; margin-bottom: 15px; display: none;">
        
        <button class="btn" id="submitBtn" onclick="orderNow()">إرسال الطلب</button>
    </div>
</div>

<div id="technician" class="page">
    <div id="tech-auth">
        <div class="card" style="text-align:center;">
            <h3>🔑 دخول الفنيين</h3>
            <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="techCode" placeholder="كود الدخول"></div>
            <button class="btn" onclick="checkTechAuth()">دخول</button>
        </div>
    </div>

    <div id="tech-reg" style="display:none;">
        <div class="card">
            <h3>📝 سجل بياناتك</h3>
            <p id="manager-note" style="display:none; font-size:12px; color:red; text-align:center;">مدير: سجل باسم "المدير" لتفعيل صلاحية الحذف.</p>
            <div class="input-group"><i class="fas fa-id-badge"></i><input type="text" id="tName" placeholder="الاسم الكامل" oninput="toggleNote(this.value)"></div>
            <div class="input-group"><i class="fas fa-phone-alt"></i><input type="tel" id="tPhone" placeholder="رقم الهاتف"></div>
            <label style="display:block; margin-bottom:15px; font-size:12px;"><input type="checkbox" id="agreeCheck"> أوافق على كافة الشروط</label>
            <button class="btn" onclick="saveTechProfile()">حفظ والبدء</button>
        </div>
    </div>

    <div id="tech-main" style="display:none;">
        <button class="logout-btn" onclick="logoutTech()"><i class="fas fa-sign-out-alt"></i> خروج وتغيير الفني</button>
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <button class="btn" style="flex:1" onclick="loadJobs('active')">النشطة</button>
            <button class="btn" style="flex:1; background:#607d8b" onclick="loadJobs('archive')">الأرشيف</button>
        </div>
        <div id="jobs-list"></div>
    </div>
</div>

<div class="footer-rights">محفوظة 2026 أمان بيتك</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBtQaVNSMC2Pkq0HmS2rql0So-4zK-czC0",
        databaseURL: "https://aman-baytak-app-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "aman-baytak-app",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.onload = () => { setTimeout(() => { document.getElementById('splash').style.display='none'; }, 2500); };

    window.toggleNote = (val) => {
        document.getElementById('manager-note').style.display = (val === "المدير") ? "block" : "none";
    };

    window.showPage = (p) => {
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
        document.getElementById(p).classList.add('active');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-'+p).classList.add('active');
    };

    window.previewFile = (input) => {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => { document.getElementById('file-preview').src = e.target.result; document.getElementById('file-preview').style.display = 'block'; };
            reader.readAsDataURL(file);
        }
    };

    window.checkTechAuth = () => {
        if(document.getElementById('techCode').value === "aman202300") {
            document.getElementById('tech-auth').style.display='none';
            const info = localStorage.getItem('techData');
            if(info) { document.getElementById('tech-main').style.display='block'; loadJobs('active'); }
            else { document.getElementById('tech-reg').style.display='block'; }
        } else { alert("الكود خطأ!"); }
    };

    window.saveTechProfile = () => {
        const n = document.getElementById('tName').value;
        const p = document.getElementById('tPhone').value;
        if(!document.getElementById('agreeCheck').checked) return alert("يرجى الموافقة");
        if(n && p) {
            localStorage.setItem('techData', JSON.stringify({name:n, phone:p}));
            location.reload();
        }
    };

    window.logoutTech = () => {
        if(confirm("هل تريد تسجيل الخروج والرجوع لصفحة الاتفاقية والاسم؟")) {
            localStorage.clear();
            location.reload();
        }
    };

    window.orderNow = async () => {
        const btn = document.getElementById('submitBtn');
        const file = document.getElementById('zFile').files[0];
        const data = {
            name: document.getElementById('zName').value,
            phone: document.getElementById('zPhone').value,
            device: document.getElementById('zDevice').value,
            addr: document.getElementById('zAddress').value,
            desc: document.getElementById('zDesc').value,
            status: "متاح",
            time: new Date().toLocaleString('ar-EG')
        };
        if(!data.name || !data.phone || !file) return alert("أكمل البيانات");
        btn.disabled = true;
        try {
            const fd = new FormData(); fd.append("image", file);
            const res = await fetch("https://api.imgbb.com/1/upload?key=6ccfe3473a01a90dffef5e509ac500dc", { method:"POST", body:fd });
            const imgRes = await res.json();
            data.img = imgRes.data.url;
            await set(push(ref(db, 'aman_jobs')), data);
            alert("تم الإرسال");
            location.reload();
        } catch(e) { alert("خطأ"); btn.disabled = false; }
    };

    window.loadJobs = (mode) => {
        const techInfo = JSON.parse(localStorage.getItem('techData') || '{}');
        const isManager = techInfo.name === "المدير";

        onValue(ref(db, 'aman_jobs'), (snap) => {
            const list = document.getElementById('jobs-list');
            list.innerHTML = "";
            snap.forEach((child) => {
                const j = child.val(); const id = child.key;
                if(mode === 'active' && j.status === 'أرشفة') return;
                if(mode === 'archive' && j.status !== 'أرشفة') return;

                const card = document.createElement('div');
                card.className = 'job-card';
                card.innerHTML = `
                    <div style="font-size:12px; color:var(--p); font-weight:bold">${j.status}</div>
                    ${j.img ? `<img src="${j.img}" class="job-img">` : ''}
                    <strong>👤 ${j.name}</strong><br>
                    <small>📍 ${j.addr}</small>
                    <p>📱 ${j.device} | 📝 ${j.desc}</p>
                    ${j.status === 'متاح' ? `<button class="btn" style="background:var(--wa); font-size:14px;" onclick="takeJob('${id}','${j.phone}')">قبول الطلب</button>` : ''}
                    ${j.status === 'مستلم' ? `<button class="btn" style="background:var(--s); font-size:14px;" onclick="updateStatus('${id}','أرشفة')">نقل للأرشيف</button>` : ''}
                    ${isManager ? `<button class="btn btn-danger" onclick="deleteJob('${id}')"><i class="fas fa-trash"></i> حذف من الأرشيف نهائياً</button>` : ''}
                `;
                list.prepend(card);
            });
        });
    };

    window.takeJob = (id, phone) => {
        let cleanPhone = phone.replace(/\D/g, '');
        if(cleanPhone.startsWith('0')) cleanPhone = '964' + cleanPhone.substring(1);
        else if(!cleanPhone.startsWith('964')) cleanPhone = '964' + cleanPhone;

        const msg = encodeURIComponent("تم قبول طلبك من منصة أمان بيتك، شنو مشكلتك؟");
        update(ref(db, `aman_jobs/${id}`), { status: "مستلم" });
        window.open(`https://wa.me/${cleanPhone}?text=${msg}`);
    };

    window.updateStatus = (id, newStatus) => { update(ref(db, `aman_jobs/${id}`), { status: newStatus }); };

    window.deleteJob = (id) => {
        if(confirm("هل أنت متأكد من الحذف النهائي؟")) {
            remove(ref(db, `aman_jobs/${id}`));
        }
    };
</script>
</body>
    </html>
